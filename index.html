<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Barrido de Picking Rihanna</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="role-selector" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center space-y-6">
        <h1 class="text-white text-3xl font-black italic uppercase tracking-widest text-center">BARRIDO DE PICKING</h1>
        <div class="flex flex-col space-y-4 w-72">
            <button onclick="initApp('admin')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl transition active:scale-95">ADMINISTRADOR</button>
            <button onclick="initApp('asistente')" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-5 rounded-2xl shadow-xl transition active:scale-95">ASISTENTE (ESCÁNER)</button>
        </div>
    </div>

    <main id="main-content" class="hidden min-h-screen">
        <div id="view-admin" class="hidden max-w-[98%] mx-auto p-4 md:p-6">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black italic">CONSOLA ADMIN</h2>
                    <button onclick="location.reload()" class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold">SALIR</button>
                </div>

                <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-6 rounded-2xl mb-8">
                    <p class="font-bold text-blue-900 mb-4 uppercase text-sm italic">Cargar Reporte de Despacho</p>
                    <div class="flex flex-wrap gap-4 items-center">
                        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" class="bg-white p-2 rounded-xl border border-blue-200 text-sm">
                        <button id="btnUpload" onclick="uploadToCloud()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">SINCRONIZAR BASE</button>
                    </div>

                    <div id="uploading-ui" class="hidden mt-6 bg-white p-5 rounded-2xl border border-blue-100">
                        <div class="flex items-center gap-3">
                            <div class="loader rounded-full border-4 border-t-4 border-slate-200 h-6 w-6"></div>
                            <span id="load-text" class="font-bold text-blue-700">Procesando archivo...</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 mt-4 overflow-hidden">
                            <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                    <div id="admin-status" class="mt-4 text-sm font-bold text-green-600 italic"></div>
                </div>

                <div class="overflow-x-auto rounded-2xl border border-slate-200 bg-slate-50 max-h-[500px]">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-slate-800 text-white sticky top-0 font-bold">
                            <tr>
                                <th class="p-4 uppercase">LPN</th>
                                <th class="p-4 uppercase">Estado Despacho</th>
                                <th class="p-4 uppercase">NV</th>
                                <th class="p-4 uppercase">SKU</th>
                                <th class="p-4 uppercase">Cant T/E/P</th>
                                <th class="p-4 uppercase">Alerta</th>
                                <th class="p-4 uppercase">Hora</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-200 font-medium"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-asistente" class="hidden max-w-md mx-auto p-4">
            <div class="bg-slate-900 rounded-[3rem] p-6 min-h-[90vh] text-white flex flex-col border-4 border-slate-800 shadow-2xl">
                <div id="qr-reader" class="rounded-[2rem] overflow-hidden border-4 border-slate-700 bg-black mb-6"></div>
                <div id="scan-result" class="hidden animate-in fade-in slide-in-from-bottom-6 duration-500">
                    <div class="bg-slate-800 p-6 rounded-[2.5rem] border-t-8 border-slate-600">
                        <p id="res-lpn" class="text-4xl font-black mb-6 tracking-tighter text-center italic"></p>
                        <div class="grid grid-cols-2 gap-4 text-[10px] font-bold mb-6 opacity-80">
                            <div class="bg-slate-700/40 p-3 rounded-2xl"><p>ESTADO</p><p id="res-est-des" class="text-white text-xs"></p></div>
                            <div class="bg-slate-700/40 p-3 rounded-2xl"><p>RETIRO</p><p id="res-est-ret" class="text-white text-xs"></p></div>
                        </div>
                        <div id="res-alerta-box" class="p-5 rounded-3xl text-center font-black text-2xl mb-6 shadow-lg border-2 border-white/10"></div>
                        <button id="btnConfirmar" onclick="confirmarYEnviar()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-3xl font-black text-xl shadow-2xl transition active:scale-90">REGISTRAR PISTOLEO</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgLkFSNiWi9hv8YDTN7nWlxAkVndWiRaU",
            authDomain: "barrido-picking-rihanna.firebaseapp.com",
            databaseURL: "https://barrido-picking-rihanna-default-rtdb.firebaseio.com",
            projectId: "barrido-picking-rihanna",
            storageBucket: "barrido-picking-rihanna.firebasestorage.app",
            messagingSenderId: "461017422852",
            appId: "1:461017422852:web:8b85f2316643c8dc676951"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initApp(role) {
            document.getElementById('role-selector').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            if(role === 'admin') {
                document.getElementById('view-admin').classList.remove('hidden');
                escucharBarrido();
            } else {
                document.getElementById('view-asistente').classList.remove('hidden');
                iniciarEscaner();
            }
        }

        async function uploadToCloud() {
            const file = document.getElementById('excelFile').files[0];
            if(!file) return alert("Selecciona el archivo.");

            const ui = document.getElementById('uploading-ui');
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('load-text');
            const btn = document.getElementById('btnUpload');

            ui.classList.remove('hidden');
            btn.disabled = true;
            bar.style.width = "10%";

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    bar.style.width = "40%";
                    text.innerText = "Leyendo columnas de reporte...";
                    
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array', cellDates: true });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    
                    // Convertir a JSON tratando todo como texto para evitar errores de formato
                    const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "", raw: false });

                    if (jsonData.length === 0) throw new Error("Vacío");

                    bar.style.width = "80%";
                    text.innerText = "Sincronizando registros...";

                    await db.ref('masterDAD').set(jsonData);

                    bar.style.width = "100%";
                    text.innerText = "¡Completado!";
                    setTimeout(() => {
                        ui.classList.add('hidden');
                        document.getElementById('admin-status').innerText = `✅ Éxito: ${jsonData.length} filas listas.`;
                        btn.disabled = false;
                    }, 800);

                } catch (err) {
                    alert("Error al procesar. Asegúrate que el archivo no esté protegido.");
                    ui.classList.add('hidden');
                    btn.disabled = false;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function iniciarEscaner() {
            const html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess);
        }

        async function onScanSuccess(decodedText) {
            const lpn = decodedText.trim();
            if (window.lastLpn === lpn) return;
            window.lastLpn = lpn;

            const snap = await db.ref('masterDAD').once('value');
            const data = snap.val() || [];
            
            // Ajustado a los nombres exactos de tu archivo subido
            window.matches = data.filter(i => String(i["LPN"] || "").trim() === lpn);

            document.getElementById('scan-result').classList.remove('hidden');
            document.getElementById('res-lpn').innerText = lpn;

            if (window.matches.length === 0) {
                mostrarAlertaAsistente("NO FIGURA", "bg-slate-600");
            } else {
                const p = window.matches[0];
                document.getElementById('res-est-des').innerText = p["Estado de despacho"] || "N/A";
                document.getElementById('res-est-ret').innerText = p["Estado de retiro"] || "N/A";
                
                const estDes = String(p["Estado de despacho"] || "").toUpperCase();
                const esMalo = estDes.includes("CANCELADO") || estDes.includes("ENTREGADO");
                mostrarAlertaAsistente(esMalo ? "RETIRAR" : "VALIDO", esMalo ? "bg-red-600" : "bg-emerald-600");
            }
        }

        function mostrarAlertaAsistente(txt, cls) {
            const box = document.getElementById('res-alerta-box');
            box.innerText = txt;
            box.className = "p-5 rounded-3xl text-center font-black text-2xl mb-6 text-white " + cls;
        }

        function confirmarYEnviar() {
            if(!window.matches) return;
            window.matches.forEach(m => {
                db.ref('barridoActual').push({
                    lpn: m["LPN"], 
                    estDes: m["Estado de despacho"], 
                    nv: m["Código de N/V"], 
                    sku: m["SKU"],
                    cant: `${m["Cantidad total"]}/${m["Cantidad entregada"]}/${m["Cantidad pendiente"]}`,
                    alerta: document.getElementById('res-alerta-box').innerText,
                    time: new Date().toLocaleTimeString()
                });
            });
            document.getElementById('scan-result').classList.add('hidden');
            window.lastLpn = "";
        }

        function escucharBarrido() {
            db.ref('barridoActual').on('child_added', (snap) => {
                const v = snap.val();
                const esAlerta = v.alerta === 'RETIRAR';
                const row = `<tr class="${esAlerta ? 'bg-red-50 text-red-700' : 'bg-white'}">
                    <td class="p-4 border-b font-mono font-black">${v.lpn}</td>
                    <td class="p-4 border-b">${v.estDes}</td>
                    <td class="p-4 border-b font-bold">${v.nv}</td>
                    <td class="p-4 border-b font-bold text-blue-600">${v.sku}</td>
                    <td class="p-4 border-b text-center">${v.cant}</td>
                    <td class="p-4 border-b font-black italic uppercase">${v.alerta}</td>
                    <td class="p-4 border-b text-slate-400 font-bold">${v.time}</td>
                </tr>`;
                document.getElementById('admin-table-body').insertAdjacentHTML('afterbegin', row);
            });
        }
    </script>
</body>
</html>
