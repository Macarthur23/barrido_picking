<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Rihanna: Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow-x: hidden; touch-action: manipulation; }
        .glow-sync { box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        #res-lpn { word-break: break-all; white-space: normal; line-height: 1; }
        .estado-box { min-height: 45px; display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="role-selector" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-4">
        <h1 class="text-white text-2xl font-black italic mb-8 uppercase tracking-tighter">BARRIDO DE PICKING</h1>
        <div class="flex flex-col space-y-4 w-full max-w-xs">
            <button onclick="initApp('admin')" class="bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition">ADMINISTRADOR</button>
            <button onclick="initApp('asistente')" class="bg-orange-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition">ASISTENTE (ESCÁNER)</button>
        </div>
    </div>

    <main id="main-content" class="hidden min-h-screen p-2">
        <div id="view-admin" class="hidden max-w-5xl mx-auto">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-4 text-center">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-black uppercase">Consola Control</h2>
                    <button onclick="limpiarBaseDeDatos()" class="bg-red-500 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase">Limpiar Base</button>
                </div>
                <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-6 rounded-2xl mb-4">
                    <input type="file" id="excelFile" class="text-xs mb-4 block w-full">
                    <button id="btnUpload" onclick="uploadLargeFile()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-sm w-full">SINCRONIZAR EXCEL</button>
                    <div id="uploading-ui" class="hidden mt-4"><div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div></div>
                </div>
                <div class="overflow-x-auto rounded-xl border">
                    <table class="w-full text-[9px] text-left">
                        <thead class="bg-slate-800 text-white"><tr><th class="p-2">LPN</th><th class="p-2">ESTADO</th><th class="p-2">ALERTA</th></tr></thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-asistente" class="hidden max-w-md mx-auto">
            <div class="bg-slate-900 rounded-[2rem] p-3 shadow-2xl min-h-[90vh] flex flex-col border-4 border-slate-800">
                <div class="flex items-center justify-between mb-2 px-2">
                    <div class="flex items-center gap-1">
                        <div id="sync-dot" class="h-2 w-2 rounded-full bg-slate-600 animate-pulse"></div>
                        <span id="sync-status-text" class="text-[8px] font-black text-slate-500 uppercase">OFFLINE</span>
                    </div>
                    <span id="sync-count" class="text-blue-400 text-[8px] font-bold uppercase tracking-tighter">0 SKU</span>
                </div>

                <div id="qr-reader" class="rounded-[1.5rem] overflow-hidden border-2 border-slate-700 bg-black mb-3"></div>
                
                <div id="scan-result" class="hidden">
                    <div class="bg-slate-800 p-3 rounded-[1.5rem] border-t-2 border-slate-600 text-white">
                        <div class="bg-black/30 p-2 rounded-xl mb-3">
                            <p id="res-lpn" class="text-lg font-black text-center text-blue-400 uppercase italic tracking-tighter"></p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-1.5 mb-3">
                            <div class="bg-slate-700/40 p-1.5 rounded-lg border border-slate-600/30 text-center estado-box">
                                <p class="text-[7px] text-slate-500 font-black uppercase mb-0.5">Estado Despacho</p>
                                <p id="res-est-des" class="text-[9px] font-bold leading-tight"></p>
                            </div>
                            <div class="bg-slate-700/40 p-1.5 rounded-lg border border-slate-600/30 text-center estado-box">
                                <p class="text-[7px] text-slate-500 font-black uppercase mb-0.5">Estado Retiro</p>
                                <p id="res-est-ret" class="text-[9px] font-bold leading-tight"></p>
                            </div>
                            <div class="bg-slate-700/40 p-1.5 rounded-lg border border-slate-600/30 text-center estado-box">
                                <p class="text-[7px] text-slate-500 font-black uppercase mb-0.5">Modalidad</p>
                                <p id="res-modalidad" class="text-[9px] font-bold text-orange-300"></p>
                            </div>
                            <div class="bg-slate-700/40 p-1.5 rounded-lg border border-slate-600/30 text-center estado-box">
                                <p class="text-[7px] text-slate-500 font-black uppercase mb-0.5">Canal</p>
                                <p id="res-canal" class="text-[9px] font-bold text-orange-300"></p>
                            </div>
                        </div>

                        <div id="res-alerta-box" class="p-2.5 rounded-xl text-center font-black text-lg mb-3 uppercase italic"></div>
                        <button onclick="confirmarYEnviar()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-md shadow-xl active:scale-95 transition uppercase italic">Confirmar Pistoleo</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgLkFSNiWi9hv8YDTN7nWlxAkVndWiRaU",
            authDomain: "barrido-picking-rihanna.firebaseapp.com",
            databaseURL: "https://barrido-picking-rihanna-default-rtdb.firebaseio.com",
            projectId: "barrido-picking-rihanna",
            storageBucket: "barrido-picking-rihanna.firebasestorage.app",
            messagingSenderId: "461017422852",
            appId: "1:461017422852:web:8b85f2316643c8dc676951"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initApp(role) {
            document.getElementById('role-selector').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            if(role === 'admin') document.getElementById('view-admin').classList.remove('hidden');
            else {
                document.getElementById('view-asistente').classList.remove('hidden');
                db.ref('masterDAD').on('value', s => {
                    const d = s.val();
                    if(d) {
                        document.getElementById('sync-dot').className = "h-2 w-2 rounded-full bg-emerald-500 glow-sync";
                        document.getElementById('sync-status-text').innerText = "ONLINE";
                        document.getElementById('sync-count').innerText = `${Object.keys(d).length} SKU`;
                    }
                });
                new Html5Qrcode("qr-reader").start({ facingMode: "environment" }, { fps: 20, qrbox: 180 }, onScanSuccess);
            }
            escucharBarrido();
        }

        async function limpiarBaseDeDatos() {
            if(confirm("¿Borrar todo?")) { await db.ref('masterDAD').set(null); await db.ref('barridoActual').set(null); location.reload(); }
        }

        async function uploadLargeFile() {
            const file = document.getElementById('excelFile').files[0];
            if(!file) return alert("Sube un archivo");
            const bar = document.getElementById('progress-bar');
            document.getElementById('uploading-ui').classList.remove('hidden');
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                
                // --- BUSCADOR DE COLUMNAS MEJORADO ---
                const getVal = (row, target) => {
                    const key = Object.keys(row).find(k => k.trim() === target);
                    return key ? String(row[key]).trim() : "NO ENCONTRADO";
                };

                const filteredData = rawData.map(r => ({
                    LPN: getVal(r, "LPN") !== "NO ENCONTRADO" ? getVal(r, "LPN") : getVal(r, "Código de despacho"),
                    EstDes: getVal(r, "Estado de despacho"),
                    EstRet: getVal(r, "Estado de retiro"),
                    Mod: getVal(r, "Modalidad de despacho"),
                    Canal: getVal(r, "Canal de venta"),
                    SKU: getVal(r, "SKU"),
                    CantP: getVal(r, "Cantidad pendiente"),
                    CantT: getVal(r, "Cantidad total"),
                    CantE: getVal(r, "Cantidad entregada")
                })).filter(i => i.LPN !== "" && i.LPN !== "NO ENCONTRADO");

                await db.ref('masterDAD').set(null);
                const chunk = 500;
                for (let i = 0; i < filteredData.length; i += chunk) {
                    const slice = filteredData.slice(i, i + chunk);
                    await db.ref('masterDAD').update(slice.reduce((a, c, idx) => { a[i+idx] = c; return a; }, {}));
                    bar.style.width = Math.floor((i / filteredData.length) * 100) + "%";
                }
                document.getElementById('admin-status').innerText = "✅ DATOS CARGADOS";
                document.getElementById('uploading-ui').classList.add('hidden');
            };
            reader.readAsArrayBuffer(file);
        }

        async function onScanSuccess(t) {
            const lpn = t.trim();
            if (window.lastLpn === lpn) return;
            window.lastLpn = lpn;

            const snap = await db.ref('masterDAD').once('value');
            const data = Object.values(snap.val() || {});
            window.matches = data.filter(i => i.LPN === lpn);

            document.getElementById('scan-result').classList.remove('hidden');
            document.getElementById('res-lpn').innerText = lpn;

            if (window.matches.length === 0) {
                mostrarAlerta("NO FIGURA", "bg-slate-600");
                ["res-est-des", "res-est-ret", "res-modalidad", "res-canal"].forEach(id => document.getElementById(id).innerText = "-");
            } else {
                const p = window.matches[0];
                document.getElementById('res-est-des').innerText = p.EstDes;
                document.getElementById('res-est-ret').innerText = p.EstRet;
                document.getElementById('res-modalidad').innerText = p.Mod;
                document.getElementById('res-canal').innerText = p.Canal;
                
                const ed = p.EstDes.toUpperCase();
                const er = p.EstRet.toUpperCase();
                const esMalo = ed.includes("CANCELADO") || ed.includes("ENTREGADO") || er.includes("CANCELADO") || er.includes("TOTALMENTE");
                mostrarAlerta(esMalo ? "RETIRAR" : "VALIDO", esMalo ? "bg-red-600 animate-pulse" : "bg-emerald-600 shadow-emerald-900/40");
            }
        }

        function mostrarAlerta(t, c) {
            const b = document.getElementById('res-alerta-box');
            b.innerText = t;
            b.className = "p-2.5 rounded-xl text-center font-black text-lg mb-3 uppercase italic text-white " + c;
        }

        function confirmarYEnviar() {
            if(!window.matches) return;
            window.matches.forEach(m => {
                db.ref('barridoActual').push({ lpn: m.LPN, estDes: m.EstDes, sku: m.SKU, alerta: document.getElementById('res-alerta-box').innerText, time: new Date().toLocaleTimeString() });
            });
            document.getElementById('scan-result').classList.add('hidden');
            window.lastLpn = "";
        }

        function escucharBarrido() {
            db.ref('barridoActual').on('child_added', (s) => {
                const v = s.val();
                const esA = v.alerta === 'RETIRAR';
                const row = `<tr class="${esA ? 'bg-red-50 text-red-700' : ''}">
                    <td class="p-2 border-b uppercase">${v.lpn}</td>
                    <td class="p-2 border-b uppercase">${v.estDes}</td>
                    <td class="p-2 border-b font-black">${v.alerta}</td>
                </tr>`;
                document.getElementById('admin-table-body').insertAdjacentHTML('afterbegin', row);
            });
        }
    </script>
</body>
</html>
