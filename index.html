<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística: Panel Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glow-sync { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="role-selector" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-4">
        <h1 class="text-white text-3xl font-black italic mb-8 uppercase text-center">BARRIDO DE PICKING</h1>
        <div class="flex flex-col space-y-4 w-full max-w-xs">
            <button onclick="initApp('admin')" class="bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl transition active:scale-95">ADMINISTRADOR (CARGAR)</button>
            <button onclick="initApp('asistente')" class="bg-orange-600 text-white font-bold py-5 rounded-2xl shadow-xl transition active:scale-95">ASISTENTE (ESCANEAR)</button>
        </div>
    </div>

    <main id="main-content" class="hidden min-h-screen p-4">
        <div id="view-admin" class="hidden max-w-5xl mx-auto">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold italic uppercase text-slate-700">Consola de Control</h2>
                    <div class="flex gap-2">
                        <button onclick="limpiarBaseDeDatos()" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-black hover:bg-red-200 transition">LIMPIAR TODO</button>
                        <button onclick="location.reload()" class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold">SALIR</button>
                    </div>
                </div>

                <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-8 rounded-3xl text-center mb-8">
                    <input type="file" id="excelFile" class="mb-6 block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-600 file:text-white cursor-pointer">
                    <button id="btnUpload" onclick="uploadLargeFile()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black shadow-lg hover:bg-black transition w-full md:w-auto">SINCRONIZAR NUEVO REPORTE</button>
                    <div id="uploading-ui" class="hidden mt-8"><div id="progress-bar" class="bg-blue-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div></div>
                    <p id="admin-status" class="mt-4 text-sm font-bold text-emerald-600 italic"></p>
                </div>

                <div class="overflow-x-auto rounded-2xl border border-slate-200">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-slate-800 text-white font-bold uppercase">
                            <tr><th class="p-4">LPN</th><th class="p-4">Estado</th><th class="p-4">SKU</th><th class="p-4">Cantidades</th><th class="p-4">Alerta</th><th class="p-4">Hora</th></tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-100 italic font-medium"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-asistente" class="hidden max-w-md mx-auto">
            <div class="bg-slate-900 rounded-[3rem] p-6 shadow-2xl min-h-[90vh] flex flex-col border-4 border-slate-800">
                <div class="flex items-center justify-between mb-4 px-2">
                    <div class="flex items-center gap-2">
                        <div id="sync-dot" class="h-3 w-3 rounded-full bg-slate-600 animate-pulse"></div>
                        <span id="sync-status-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Verificando Base...</span>
                    </div>
                    <span id="sync-count" class="bg-slate-800 text-blue-400 text-[10px] px-3 py-1 rounded-full font-bold border border-slate-700">0 SKU</span>
                </div>

                <div id="qr-reader" class="rounded-[2rem] overflow-hidden border-2 border-slate-700 bg-black mb-6"></div>
                
                <div id="scan-result" class="hidden animate-in fade-in slide-in-from-bottom-8 duration-500">
                    <div class="bg-slate-800 p-5 rounded-[2.5rem] border-t-4 border-slate-500 text-white">
                        <p id="res-lpn" class="text-4xl font-black text-center mb-4 italic"></p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-4 text-[9px] font-bold opacity-90 text-center uppercase">
                            <div class="bg-slate-700/50 p-2 rounded-xl border border-slate-600/50"><p class="text-slate-400 mb-1">Est. Desp.</p><p id="res-est-des" class="text-blue-300"></p></div>
                            <div class="bg-slate-700/50 p-2 rounded-xl border border-slate-600/50"><p class="text-slate-400 mb-1">Est. Retiro</p><p id="res-est-ret" class="text-blue-300"></p></div>
                            <div class="bg-slate-700/50 p-2 rounded-xl border border-slate-600/50"><p class="text-slate-400 mb-1">Modalidad</p><p id="res-modalidad" class="text-orange-300"></p></div>
                            <div class="bg-slate-700/50 p-2 rounded-xl border border-slate-600/50"><p class="text-slate-400 mb-1">Canal</p><p id="res-canal" class="text-orange-300"></p></div>
                        </div>

                        <div id="res-alerta-box" class="p-4 rounded-3xl text-center font-black text-2xl mb-6 uppercase italic border-2 border-white/10"></div>
                        <button onclick="confirmarYEnviar()" class="w-full bg-blue-600 py-6 rounded-3xl font-black text-xl shadow-2xl active:scale-95 transition italic">REGISTRAR EN TABLA</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgLkFSNiWi9hv8YDTN7nWlxAkVndWiRaU",
            authDomain: "barrido-picking-rihanna.firebaseapp.com",
            databaseURL: "https://barrido-picking-rihanna-default-rtdb.firebaseio.com",
            projectId: "barrido-picking-rihanna",
            storageBucket: "barrido-picking-rihanna.firebasestorage.app",
            messagingSenderId: "461017422852",
            appId: "1:461017422852:web:8b85f2316643c8dc676951"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initApp(role) {
            document.getElementById('role-selector').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            if(role === 'admin') document.getElementById('view-admin').classList.remove('hidden');
            else {
                document.getElementById('view-asistente').classList.remove('hidden');
                iniciarMonitorSincronizacion();
                const scanner = new Html5Qrcode("qr-reader");
                scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
            }
            escucharBarrido();
        }

        function iniciarMonitorSincronizacion() {
            db.ref('masterDAD').on('value', (snap) => {
                const data = snap.val();
                const dot = document.getElementById('sync-dot');
                const txt = document.getElementById('sync-status-text');
                const count = document.getElementById('sync-count');
                if (data) {
                    const total = Object.keys(data).length;
                    dot.className = "h-3 w-3 rounded-full bg-emerald-500 glow-sync";
                    txt.innerText = "Sincronizado";
                    txt.className = "text-[10px] font-black text-emerald-400 uppercase tracking-widest";
                    count.innerText = `${total} PRODUCTOS`;
                }
            });
        }

        async function limpiarBaseDeDatos() {
            if(confirm("¿Borrar base actual e historial?")) {
                await db.ref('masterDAD').set(null);
                await db.ref('barridoActual').set(null);
                location.reload();
            }
        }

        async function uploadLargeFile() {
            const file = document.getElementById('excelFile').files[0];
            if(!file) return alert("Selecciona archivo.");
            const ui = document.getElementById('uploading-ui');
            const bar = document.getElementById('progress-bar');
            ui.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawData = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                
                const filteredData = rawData.map(r => ({
                    LPN: String(r["LPN"] || r["Código de despacho"] || "").trim(),
                    EstDes: String(r["Estado de despacho"] || "").trim(),
                    EstRet: String(r["Estado de retiro"] || "").trim(), // Agregado
                    Mod: String(r["Modalidad de despacho"] || "").trim(), // Agregado
                    Canal: String(r["Canal de venta"] || "").trim(), // Agregado
                    SKU: String(r["SKU"] || "").trim(),
                    CantP: String(r["Cantidad pendiente"] || "0"),
                    CantT: String(r["Cantidad total"] || "0"),
                    CantE: String(r["Cantidad entregada"] || "0")
                })).filter(r => r.LPN !== "");

                await db.ref('masterDAD').set(null); 
                const chunkSize = 500;
                for (let i = 0; i < filteredData.length; i += chunkSize) {
                    const chunk = filteredData.slice(i, i + chunkSize);
                    await db.ref('masterDAD').update(chunk.reduce((a, c, idx) => { a[i+idx] = c; return a; }, {}));
                    bar.style.width = Math.floor((i / filteredData.length) * 100) + "%";
                }
                document.getElementById('admin-status').innerText = "✅ Sincronizado correctamente.";
                ui.classList.add('hidden');
            };
            reader.readAsArrayBuffer(file);
        }

        async function onScanSuccess(decodedText) {
            const lpn = decodedText.trim();
            if (window.lastLpn === lpn) return;
            window.lastLpn = lpn;

            const snap = await db.ref('masterDAD').once('value');
            const data = snap.val() || [];
            window.matches = Object.values(data).filter(i => i.LPN === lpn);

            document.getElementById('scan-result').classList.remove('hidden');
            document.getElementById('res-lpn').innerText = lpn;

            if (window.matches.length === 0) {
                mostrarAlertaAsistente("NO FIGURA", "bg-slate-500");
                document.getElementById('res-est-des').innerText = "-";
                document.getElementById('res-est-ret').innerText = "-";
                document.getElementById('res-modalidad').innerText = "-";
                document.getElementById('res-canal').innerText = "-";
            } else {
                const p = window.matches[0];
                document.getElementById('res-est-des').innerText = p.EstDes;
                document.getElementById('res-est-ret').innerText = p.EstRet;
                document.getElementById('res-modalidad').innerText = p.Mod;
                document.getElementById('res-canal').innerText = p.Canal;
                
                const esMalo = p.EstDes.toUpperCase().includes("CANCELADO") || p.EstDes.toUpperCase().includes("ENTREGADO");
                mostrarAlertaAsistente(esMalo ? "RETIRAR" : "VALIDO", esMalo ? "bg-red-600" : "bg-emerald-600 shadow-lg");
            }
        }

        function mostrarAlertaAsistente(txt, cls) {
            const box = document.getElementById('res-alerta-box');
            box.innerText = txt;
            box.className = "p-4 rounded-3xl text-center font-black text-2xl mb-6 shadow-lg text-white " + cls;
        }

        function confirmarYEnviar() {
            if(!window.matches) return;
            window.matches.forEach(m => {
                db.ref('barridoActual').push({
                    lpn: m.LPN, estDes: m.EstDes, sku: m.SKU,
                    cant: `${m.CantT}/${m.CantE}/${m.CantP}`,
                    alerta: document.getElementById('res-alerta-box').innerText,
                    time: new Date().toLocaleTimeString()
                });
            });
            document.getElementById('scan-result').classList.add('hidden');
            window.lastLpn = "";
        }

        function escucharBarrido() {
            db.ref('barridoActual').on('child_added', (snap) => {
                const v = snap.val();
                const esAlerta = v.alerta === 'RETIRAR';
                const row = `<tr class="${esAlerta ? 'bg-red-50 text-red-700 font-bold' : 'bg-white'}">
                    <td class="p-4 border-b font-mono font-black">${v.lpn}</td>
                    <td class="p-4 border-b uppercase">${v.estDes}</td>
                    <td class="p-4 border-b text-blue-600 font-bold">${v.sku}</td>
                    <td class="p-4 border-b text-center font-bold text-slate-500">${v.cant}</td>
                    <td class="p-4 border-b font-black uppercase italic">${v.alerta}</td>
                    <td class="p-4 border-b text-slate-400 text-center">${v.time}</td>
                </tr>`;
                document.getElementById('admin-table-body').insertAdjacentHTML('afterbegin', row);
            });
        }
    </script>
</body>
</html>
